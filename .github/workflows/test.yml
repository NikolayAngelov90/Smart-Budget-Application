name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -p "
            const coverage = require('./coverage/coverage-summary.json');
            const total = coverage.total;
            Math.min(total.statements.pct, total.branches.pct, total.functions.pct, total.lines.pct);
          ")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 5" | bc -l) )); then
            echo "❌ Coverage ($COVERAGE%) is below 5% threshold"
            exit 1
          fi
          echo "✅ Coverage ($COVERAGE%) meets minimum 5% threshold"
          echo "📈 Target coverage: 30% (current: $COVERAGE%)"

      - name: Check required environment variables
        run: node scripts/check-env-vars.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build production app for benchmarks
        run: npm run build
        env:
          # Test credentials for build-time static generation
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          UPSTASH_REDIS_REST_URL: https://test.upstash.io
          UPSTASH_REDIS_REST_TOKEN: test-token
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          BENCHMARK_MODE: 'true'

      - name: Start Next.js server in background
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          # Test credentials for runtime
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          UPSTASH_REDIS_REST_URL: https://test.upstash.io
          UPSTASH_REDIS_REST_TOKEN: test-token
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          BENCHMARK_MODE: 'true'

      - name: Run performance benchmarks
        id: benchmarks
        run: npm run benchmark
        continue-on-error: true
        env:
          # Test credentials for benchmarking
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          BENCHMARK_MODE: 'true'

      - name: Post benchmark results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const resultsPath = './benchmarks/results.json';
            const baselinePath = './benchmarks/baseline.json';

            if (!fs.existsSync(resultsPath)) {
              console.log('No benchmark results found');
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
            let baseline = null;

            if (fs.existsSync(baselinePath)) {
              baseline = JSON.parse(fs.readFileSync(baselinePath, 'utf-8'));
            }

            const metrics = [
              { key: 'dashboard_load_ms', label: 'Dashboard Load', threshold: 2000 },
              { key: 'pie_chart_render_ms', label: 'Pie Chart Render', threshold: 100 },
              { key: 'line_chart_render_ms', label: 'Line Chart Render', threshold: 150 },
              { key: 'realtime_latency_ms', label: 'Real-time Latency', threshold: 300 },
            ];

            let tableRows = '';
            metrics.forEach(({ key, label, threshold }) => {
              const current = results[key];

              // Skip if measurement was not available (-1)
              if (current === -1) {
                tableRows += `| ${label} | Not measured | N/A | N/A | ⊘ |\n`;
                return;
              }

              const status = current > threshold ? '❌' : '✅';

              if (baseline) {
                const baselineValue = baseline[key];
                const change = current - baselineValue;
                const changePercent = ((change / baselineValue) * 100).toFixed(1);
                const trend = change > 0 ? '↑' : change < 0 ? '↓' : '→';
                tableRows += `| ${label} | ${current}ms | ${baselineValue}ms | ${trend} ${changePercent}% | ${status} |\n`;
              } else {
                tableRows += `| ${label} | ${current}ms | N/A | N/A | ${status} |\n`;
              }
            });

            const comment = \`## 📊 Performance Benchmark Results

            | Metric | Current | Baseline | Change | Status |
            |--------|---------|----------|--------|--------|
            \${tableRows}

            **Thresholds:**
            - Dashboard Load: <2000ms
            - Pie Chart Render: <100ms
            - Line Chart Render: <150ms
            - Real-time Latency: <300ms

            \${results.dashboard_load_ms > 2000 || results.realtime_latency_ms > 300 ? '⚠️ **Performance regression detected!**' : '✅ All performance targets met'}
            \`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Deploy Vercel preview and post URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            try {
              execSync('npm install --global vercel@latest', { stdio: 'inherit' });
              execSync('vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}', { stdio: 'inherit' });
              execSync('vercel build --token=${{ secrets.VERCEL_TOKEN }}', { stdio: 'inherit' });
              const previewUrl = execSync(
                'vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}',
                { encoding: 'utf8' }
              ).trim();

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🚀 Vercel Preview Deployment\n\nPreview URL: ${previewUrl}\n\nThis preview will be updated on each push to this PR.`
              });
            } catch (err) {
              console.log('Preview deployment skipped (Vercel secrets may not be configured):', err.message);
            }

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deployment checks
        run: node scripts/pre-deployment-check.js

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
